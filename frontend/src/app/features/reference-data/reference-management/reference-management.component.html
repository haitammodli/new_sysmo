<div class="px-4 sm:px-6 lg:px-8 py-8 w-full max-w-9xl mx-auto">
  <div class="mb-8">
    <h2 class="text-3xl font-bold text-slate-800 tracking-tight dark:text-slate-300">Gestion des Données de Référence</h2>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div class="card-premium lg:col-span-2 overflow-hidden flex flex-col">
      <div class="px-6 py-5 border-b border-gray-100 bg-slate-50/50 flex justify-between items-center">
        <h3 class="font-bold text-lg text-slate-800 dark:text-dark-300 ">Liste des Références</h3>
        
        <div class="w-1/3 relative">
          <select 
            class="block w-full rounded-lg border-0 py-2 pl-3 pr-10 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm transition-all"
            (change)="onCategoryChange($event)"
            [value]="selectedCategory"
          >
            <option *ngFor="let cat of categories" [value]="cat">{{cat}}</option>
          </select>
        </div>
      </div>

      <div class="overflow-x-auto flex-1 bg-white">
        <table class="min-w-full divide-y divide-gray-100">
          <thead class="bg-white">
            <tr>
              <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">ID</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Libellé</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Statut</th>
              <th class="px-6 py-4 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100 bg-white">
            <tr *ngFor="let ref of references" class="hover:bg-slate-50/80 transition-colors group">
              <td class="px-6 py-5 whitespace-nowrap text-sm font-bold text-slate-800 font-mono">#{{ref.id}}</td>
              <td class="px-6 py-5 whitespace-nowrap text-sm font-medium text-slate-800">{{ref.libelle}}</td>
              
              <td class="px-6 py-5 whitespace-nowrap">
                <span [ngClass]="ref.active ? 'bg-green-100 text-green-800 border bg-opacity-50 border-green-200' : 'bg-slate-100 text-slate-600 border bg-opacity-50 border-slate-200'" 
                      class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold shadow-sm">
                  <span class="w-1.5 h-1.5 rounded-full mr-1.5" [ngClass]="ref.active ? 'bg-green-500' : 'bg-slate-400'"></span>
                  {{ ref.active ? 'Actif' : 'Inactif' }}
                </span>
              </td>

              <td class="px-6 py-5 whitespace-nowrap text-right text-sm font-medium">
                <button (click)="toggleStatus(ref)" 
                        [title]="ref.active ? 'Désactiver' : 'Réactiver'"
                        class="inline-flex items-center justify-center p-2 rounded-lg text-slate-400 hover:text-primary hover:bg-green-50 transition-colors">
                  <span class="sr-only">{{ ref.active ? 'Désactiver' : 'Réactiver' }}</span>
                  <svg *ngIf="ref.active" class="w-5 h-5 text-red-400 hover:text-red-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
                  </svg>
                  <svg *ngIf="!ref.active" class="w-5 h-5 text-green-500 hover:text-green-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                </button>
              </td>
            </tr>

            <tr *ngIf="references.length === 0">
              <td colspan="4" class="px-6 py-16 text-center">
                <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-slate-100 mb-4">
                  <svg class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                  </svg>
                </div>
                <h3 class="mt-2 text-sm font-semibold text-slate-800">Aucune référence</h3>
                <p class="mt-1 text-sm text-slate-500">Aucune référence active trouvée pour cette catégorie.</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card-premium h-fit relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-1 bg-primary"></div>
      <div class="px-6 py-6 sm:p-8">
        <h3 class="text-xl font-bold leading-7 text-slate-800 mb-6 flex items-center dark:text-slate-300">
          <svg class="w-5 h-5 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Nouvelle Référence
        </h3>
        
        <form #addForm="ngForm" (ngSubmit)="addReference(addForm)" class="space-y-6">
          <div>
            <label class="block text-sm font-semibold leading-6 text-slate-700 dark:text-slate-300">Catégorie</label>
            <div class="mt-2 text-black">
              <select 
                name="categorie"
                [(ngModel)]="newReference.categorie"
                required
                class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm transition-all"
              >
                <option *ngFor="let cat of categories" [value]="cat">{{cat}}</option>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold leading-6 text-slate-700 dark:text-slate-300">Libellé</label>
            <div class="mt-2 text-black">
              <input 
                type="text" 
                name="libelle"
                [(ngModel)]="newReference.libelle"
                required
                maxlength="100"
                class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm transition-all"
                placeholder="Ex: Document, Express..."
              >
            </div>
          </div>

          <button 
            type="submit" 
            [disabled]="!addForm.form.valid"
            class="w-full rounded-xl bg-primary px-4 py-3 text-sm font-bold text-white shadow-sm hover:bg-green-600 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary disabled:opacity-50 disabled:cursor-not-allowed transition-all"
          >
            Ajouter au système
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
