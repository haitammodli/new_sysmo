<div class="flex h-screen w-full bg-background dark:bg-slate-950 overflow-hidden transition-colors duration-300">

  <!-- Sidebar -->
  <aside class="w-64 bg-surface dark:bg-slate-800 border-r border-border dark:border-slate-700 flex flex-col hidden md:flex transition-colors duration-300">
    <div class="h-20 flex items-center px-6 border-b border-border dark:border-slate-700 bg-gray-50/50 dark:bg-slate-800/50">
      <div class="flex items-center space-x-3">
        <img src="assets/logo1.svg" alt="SDTM Logo" class="h-10 w-auto">
        <div class="flex flex-col">
          <span class="text-sm font-bold text-primary leading-tight tracking-tight">SDTM</span>
        </div>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto py-4">
      <ul class="space-y-2 px-4">
        <li>
          <a routerLink="/dashboard/overview" routerLinkActive="bg-green-100 dark:bg-primary/20 text-green-800 dark:text-primary"
            class="flex items-center space-x-3 px-4 py-3 text-text dark:text-slate-300 hover:bg-green-50 dark:hover:bg-slate-700/50 rounded-lg font-medium transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
              </path>
            </svg>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a routerLink="/dashboard/expeditions" routerLinkActive="bg-green-100 dark:bg-primary/20 text-green-800 dark:text-primary"
            class="flex items-center space-x-3 px-4 py-3 text-text dark:text-slate-300 hover:bg-green-50 dark:hover:bg-slate-700/50 rounded-lg font-medium transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17l6-6-6-6"></path>
            </svg>
            <span>Expeditions</span>
          </a>
        </li>
        @if (authService.hasRole(['ADMIN', 'RESPONSABLEMODIFICATION', 'AGENTMODIFICATION'])) {
        <li>
          <a routerLink="/dashboard/admin"
            routerLinkActive="bg-green-100 dark:bg-primary/20 text-green-800 dark:text-primary"
            class="flex items-center space-x-3 px-4 py-3 text-text dark:text-slate-300 hover:bg-green-50 dark:hover:bg-slate-700/50 rounded-lg font-medium transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
              </path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <span>Admin Panel</span>
          </a>
        </li>
        }

      </ul>
    </nav>

    <div class="p-4 border-t border-border dark:border-slate-700">
      <button (click)="logout()"
        class="w-full flex items-center justify-center space-x-2 px-4 py-2 bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-500/20 rounded-lg transition-colors font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
        </svg>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Top Header -->
    <header class="h-16 bg-surface dark:bg-slate-800 border-b border-border dark:border-slate-700 flex items-center justify-between px-6 shadow-sm z-10 transition-colors duration-300">
      <h2 class="text-xl font-semibold text-text dark:text-slate-100"></h2>
      <div class="flex items-center space-x-4">
        
        <!-- Dark Mode Toggle -->
        <app-theme-toggle></app-theme-toggle>
        
        <div class="h-6 w-px bg-border dark:bg-slate-700"></div>

        <span class="text-sm font-medium text-gray-600 dark:text-slate-400">{{ userEmail }}</span>
        <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-surface font-bold ring-2 ring-transparent dark:ring-slate-700">
          {{ userInitials }}
        </div>
      </div>
    </header>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto p-6">

      <!-- Dynamic Router Outlet -->
      <router-outlet></router-outlet>

    </div>
  </main>
</div>
