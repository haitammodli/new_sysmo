<div class="min-h-full px-4 sm:px-6 lg:px-8 py-8 w-full max-w-9xl mx-auto">

  <div class="mb-6">
    <h1 class="text-3xl font-bold text-slate-800 tracking-tight dark:text-slate-100">Tableau de Bord</h1>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg shadow-green-900/5 dark:shadow-black/20 p-6 mb-6">
    
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div class="bg-green-700 bg-green-600 rounded-full p-1 inline-flex items-center gap-1 shadow-inner overflow-x-auto">

        <a
          routerLink="overview"
          routerLinkActive="bg-white !text-slate-900 shadow-md scale-[1.02]"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold text-white transition-all duration-300 hover:bg-black/10 whitespace-nowrap">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
          </svg>
          <span>Vue d'ensemble</span>
        </a>

        <a
          routerLink="expeditions"
          routerLinkActive="bg-white !text-slate-900 shadow-md scale-[1.02]"
          [routerLinkActiveOptions]="{ exact: false }"
          class="flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold text-white transition-all duration-300 hover:bg-black/10 whitespace-nowrap">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4M4 7v10l8 4" />
          </svg>
          <span>Expéditions</span>
        </a>

        <a
          routerLink="modifications"
          routerLinkActive="bg-white !text-slate-900 shadow-md scale-[1.02]"
          [routerLinkActiveOptions]="{ exact: false }"
          class="flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold text-white transition-all duration-300 hover:bg-black/10 whitespace-nowrap">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
          <span>Modifications</span>
          <span class="flex items-center justify-center w-5 h-5 text-[10px] font-bold bg-amber-500 !text-white rounded-full leading-none shadow">3</span>
        </a>

        <a
          routerLink="annulations"
          routerLinkActive="bg-white !text-slate-900 shadow-md scale-[1.02]"
          [routerLinkActiveOptions]="{ exact: false }"
          class="flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold text-white transition-all duration-300 hover:bg-black/10 whitespace-nowrap">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>Annulations</span>
          <span class="flex items-center justify-center w-5 h-5 text-[10px] font-bold bg-red-500 !text-white rounded-full leading-none shadow">1</span>
        </a>

      </div>
    </div>
  </div>

  <div class="bg-transparent">
    <router-outlet></router-outlet>
  </div>

</div>
