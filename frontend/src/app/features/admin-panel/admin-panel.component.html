<div class="min-h-full">

  <!-- Page Header -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-slate-100">Panneau Admin</h1>
  </div>

  <!-- Segmented Control Card -->
  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg shadow-green-900/5 dark:shadow-black/20 p-6 mb-6">

    <!-- Tab Switcher Container -->
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div class="bg-green-700 bg-green-600 rounded-full p-1 inline-flex items-center gap-1 shadow-inner">

        <!-- Tab: Expéditions -->
        <a routerLink="expeditions" routerLinkActive="bg-white !text-slate-900 shadow-md scale-[1.02]"
          [routerLinkActiveOptions]="{ exact: false }"
          class="relative flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold text-white transition-all duration-300 hover:bg-black/10 whitespace-nowrap">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4M4 7v10l8 4" />
          </svg>
          <span>Expéditions</span>
          <!-- Notification Badge 
          @if (expeditionCount > 0) {
            <span class="flex items-center justify-center w-5 h-5 text-[10px] font-bold bg-red-500 !text-white rounded-full leading-none shadow">
              {{ expeditionCount }}
            </span>
          }-->
        </a>

        <!-- Tab: Nouvelle Expédition 
        <a
          routerLink="expeditions/add"
          routerLinkActive="bg-white !text-slate-900 shadow-md scale-[1.02]"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold text-white transition-all duration-300 hover:bg-black/10 whitespace-nowrap">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          <span>Nouvelle Expédition</span>
        </a>-->

        <!-- Tab: Gestion Agences -->
        <a routerLink="agences" routerLinkActive="bg-white !text-slate-900 shadow-md scale-[1.02]"
          [routerLinkActiveOptions]="{ exact: false }"
          class="flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold text-white transition-all duration-300 hover:bg-black/10 whitespace-nowrap">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg>
          <span>Gestion Agences</span>
        </a>

        <!-- Tab: Gestion Utilisateurs -->
        <a routerLink="users" routerLinkActive="bg-white !text-slate-900 shadow-md scale-[1.02]"
          [routerLinkActiveOptions]="{ exact: false }"
          class="flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold text-white transition-all duration-300 hover:bg-black/10 whitespace-nowrap">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <span>Gestion Utilisateurs</span>
        </a>

        <!-- Tab: Gestion reference-data -->
        <a routerLink="reference-data" routerLinkActive="bg-white !text-slate-900 shadow-md scale-[1.02]"
          [routerLinkActiveOptions]="{ exact: false }"
          class="flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold text-white transition-all duration-300 hover:bg-black/10 whitespace-nowrap">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" />
          </svg>
          <span>Gestion Reference Data</span>
        </a>

      </div>
    </div>
  </div>

  <!-- Content Card -->
  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg shadow-green-900/5 dark:shadow-black/20 p-6">
    <router-outlet></router-outlet>
  </div>

</div>
