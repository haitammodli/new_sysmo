<div class="px-4 sm:px-6 lg:px-8 py-8 w-full max-w-9xl mx-auto">

  <div class="sm:flex sm:items-center sm:justify-between mb-8">
    <div class="sm:flex-auto">
      <h1 class="text-3xl font-bold text-slate-800 tracking-tight dark:text-slate-300">Gestion des Agences</h1>
    </div>
  </div>

  <div class="card-premium mb-8">
    <div class="p-6 flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0 md:space-x-4">
      
      <div class="relative w-full md:w-96">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <input 
          type="text" 
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearchChange($event)"
          placeholder="Rechercher par nom ou ville..." 
          class="block w-full rounded-lg border-0 py-2.5 pl-10 pr-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm transition-all"
        >
      </div>

      <div class="flex flex-wrap items-center gap-4">
        <button 
          (click)="openAddModal()"
          class="inline-flex items-center px-4 py-2.5 bg-primary text-white rounded-lg shadow-sm text-sm font-bold hover:bg-green-600 transition-colors"
        >
          <svg class="-ml-1 mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          Nouvelle Agence
        </button>
      </div>
    </div>
  </div>

  <div class="card-premium overflow-hidden">
    <table class="min-w-full divide-y divide-border">
      <thead class="bg-white">
        <tr>
          <th scope="col" class="py-4 pl-6 pr-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Code</th>
          <th scope="col" class="px-3 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Agence</th>
          <th scope="col" class="px-3 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Ville</th>
          <th scope="col" class="px-3 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Chef d'Agence</th>
          <th scope="col" class="relative py-4 pl-3 pr-6 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-border bg-white">
        <tr *ngIf="filteredAgences.length === 0">
          <td colspan="5" class="px-6 py-16 text-center">
            <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-slate-100 mb-4">
              <svg class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
              </svg>
            </div>
            <h3 class="mt-2 text-sm font-semibold text-slate-800">Aucune agence</h3>
            <p class="mt-1 text-sm text-slate-500">Aucune agence trouvée.</p>
          </td>
        </tr>

        <tr *ngFor="let a of filteredAgences" class="hover:bg-slate-50/80 transition-colors duration-150 group">
          <td class="whitespace-nowrap py-5 pl-6 pr-3 text-sm font-bold text-slate-800 font-mono">
            #{{ a.code }}
          </td>
          <td class="whitespace-nowrap px-3 py-5 text-sm font-bold text-slate-800">
            {{ a.nom }}
          </td>
          <td class="whitespace-nowrap px-3 py-5 text-sm text-slate-500 font-medium">
            {{ a.ville }}
          </td>
          
          <td class="whitespace-nowrap px-3 py-5 text-sm font-medium">
            <span *ngIf="a.chefNomComplet" class="inline-flex items-center rounded-md bg-blue-50 px-2 py-1 text-xs font-medium text-blue-700 ring-1 ring-inset ring-blue-700/10">
              <svg class="mr-1.5 h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
              {{ a.chefNomComplet }}
            </span>
            <span *ngIf="!a.chefNomComplet" class="inline-flex items-center rounded-md bg-red-50 px-2 py-1 text-xs font-medium text-red-700 ring-1 ring-inset ring-red-600/10">
              Sans Chef
            </span>
          </td>

          <td class="whitespace-nowrap py-5 pl-3 pr-6 text-right text-sm font-medium">
            <div class="flex justify-end space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
              <button 
                (click)="onEdit(a)"
                class="inline-flex items-center justify-center p-2 rounded-lg text-slate-400 hover:text-primary hover:bg-green-50 transition-colors"
                title="Modifier">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
              </button>
              <button 
                (click)="onDelete(a)"
                class="inline-flex items-center justify-center p-2 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50 transition-colors"
                title="Supprimer">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="showAddModal" class="fixed inset-0 z-50 flex items-center justify-center overflow-y-auto overflow-x-hidden bg-slate-900/40 backdrop-blur-sm">
  <div class="relative p-4 w-full max-w-lg h-full md:h-auto">
    <div class="relative card-premium">
      
      <div class="flex justify-between items-center px-6 py-5 border-b border-border bg-slate-50/50">
        <h3 class="text-lg font-bold text-slate-800">
          {{ isEditMode ? 'Modifier Agence' : 'Nouvelle Agence' }}
        </h3>
        <button (click)="closeAddModal()" type="button" class="text-slate-400 bg-transparent hover:bg-slate-200 hover:text-slate-900 rounded-lg text-sm p-1.5 ml-auto inline-flex items-center transition-colors">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
        </button>
      </div>
      
      <div class="p-6 space-y-6">
        <form (ngSubmit)="submitNewAgence()" #addAgenceForm="ngForm">
          <div class="grid grid-cols-1 gap-6">

            <div>
              <label class="block mb-2 text-sm font-semibold text-slate-700 dark:text-slate-300">Code de l'Agence</label>
              <input type="text" [(ngModel)]="newAgence.code" name="code" required class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm transition-all bg-white" placeholder="Code de l'agence (ex: 100)">
            </div>
            <div>
              <label class="block mb-2 text-sm font-semibold text-slate-700 dark:text-slate-300">Nom de l'Agence</label>
              <input type="text" [(ngModel)]="newAgence.nom" name="nom" required class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm transition-all bg-white" placeholder="Nom de l'agence (ex: SDTM Casa)">
            </div>

            <div>
              <label class="block mb-2 text-sm font-semibold text-slate-700 dark:text-slate-300">Ville</label>
              <input type="text" [(ngModel)]="newAgence.ville" name="ville" required class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm transition-all bg-white" placeholder="Ville d'implantation">
            </div>

            <div>
              <label class="block mb-2 text-sm font-semibold text-slate-700 dark:text-slate-300">Responsable (Chef d'Agence)</label>
              <select [(ngModel)]="newAgence.matricule" name="matricule" class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm transition-all bg-white">
                <option [ngValue]="null">-- Sélectionner un Chef (Optionnel) --</option>
                <option *ngFor="let chef of chefs" [ngValue]="chef.code">
                  {{ chef.nom }} {{ chef.prenom }}
                </option>
              </select>
            </div>

          </div>
          
          <div class="flex justify-end items-center mt-8 pt-5 border-t border-border space-x-4">
            <button type="button" (click)="closeAddModal()" class="text-slate-600 bg-white hover:bg-slate-50 hover:text-slate-900 rounded-xl border border-slate-200 text-sm font-bold px-6 py-2.5 transition-all shadow-sm">
              Annuler
            </button>
            <button type="submit" [disabled]="!addAgenceForm.valid" class="text-white bg-primary hover:bg-green-600 rounded-xl shadow-md text-sm font-bold px-6 py-2.5 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
              Enregistrer
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
