<div class="flex h-screen w-full bg-background dark:bg-slate-950 transition-colors duration-300">
  <!-- Left Side: Solid SDTM Green -->
  <div class="hidden lg:flex lg:w-1/2 bg-primary flex-col justify-center items-center text-surface p-12">
    <!-- Placeholder for SDTM Logo -->
    <div class="w-64 h-64  border-surface border-dashed rounded-xl flex items-center justify-center mb-8">
      <img 
      src="assets/logo.png" 
      alt="SDTM Logo" 
      class="w-64 h-auto drop-shadow-[0_10px_10px_rgba(255,255,255,0.2)]"
    />
    </div>
    <h1 class="text-4xl font-bold mb-4">SYSMO</h1>
    <p class="text-lg text-center max-w-md opacity-90">Secure expedition and taxation management system.</p>
  </div>

  <!-- Right Side: Login Form -->
  <div class="w-full lg:w-1/2 flex justify-center items-center p-8 bg-surface dark:bg-slate-800 shadow-2xl z-10 transition-colors duration-300 relative">
    
    <!-- Theme Toggle Positioned in top right -->
    <div class="absolute top-6 right-6">
      <app-theme-toggle></app-theme-toggle>
    </div>

    <div class="w-full max-w-md">
      <div class="mb-10 text-center lg:text-left">
        <h2 class="text-3xl font-bold text-text dark:text-slate-100 mb-2">Welcome Back</h2>
        <p class="text-gray-500 dark:text-slate-400">Sign in to your account to continue</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium text-text dark:text-slate-300 mb-1">Email ID</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="email" 
            required
            class="w-full px-4 py-3 rounded-lg border border-border dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder-slate-400"
            placeholder="Enter your email"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-text dark:text-slate-300 mb-1">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="password" 
            required
            class="w-full px-4 py-3 rounded-lg border border-border dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder-slate-400"
            placeholder="Enter your password"
          />
        </div>

        <div *ngIf="errorMessage" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm">
          {{ errorMessage }}
        </div>

        <button 
          type="submit" 
          [disabled]="isLoading"
          class="w-full bg-primary hover:bg-green-700 text-surface font-semibold py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition-all flex justify-center items-center"
        >
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="animate-pulse">Signing In...</span>
        </button>
      </form>
    </div>
  </div>
</div>
